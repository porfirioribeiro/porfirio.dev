allowBuilds:
  '@parcel/watcher': true
  '@sveltejs/kit': true
  esbuild: true
  sharp: true
  workerd: true

# Disable the default 24h minimum release age check (pnpm v11 default).
# Not needed for a personal project; would block freshly-published packages.
minimumReleaseAge: 0
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.1
  vite-plus: 0.2.1
overrides:
  vite: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: '*'
minimumReleaseAgeExclude:
  - vite-plus
  - '@voidzero-dev/*'
  - oxlint
  - '@oxlint/*'
  - oxlint-tsgolint
  - '@oxlint-tsgolint/*'
  - oxfmt
  - '@oxfmt/*'
